<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cheku</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

  <div class="container">

    <div class="profile">

      <img class="avatar" id="avatar" src="" alt="avatar">

      <h1 class="username" id="username"></h1>

      <div class="status" id="discordStatus"></div>

      <div class="music">
        <a href="" id="trackLink" target="_blank">
          <img src="album.png" class="album" id="album">
        </a>

        <div class="music-info">
          <p class="song" id="song"></p>
          <p class="artist" id="artist"></p>

          <div class="progress" id="progress">
            <div class="bar" id="bar"></div>
          </div>
        </div>
      </div>

      <div class="socials">
        <a href="https://discordapp.com/users/491473057538506763" target="_blank">
          <i class="fa-brands fa-discord"></i>
        </a>

        <a href="https://steamcommunity.com/id/chekuu/" target="_blank">
          <i class="fa-brands fa-steam"></i>
        </a>

        <a href="https://open.spotify.com/user/313x3jweg6ekkgmw7gfuk2j6prty" target="_blank">
          <i class="fa-brands fa-spotify"></i>
        </a>

        <a href="https://www.last.fm/user/picklet1ckle" target="_blank">
          <i class="fa-brands fa-lastfm"></i>
        </a>

        <a href="https://www.tiktok.com/@.cheku" target="_blank">
          <i class="fa-brands fa-tiktok"></i>
        </a>
      </div>

    </div>

  </div>

</body>
<script src="index.js"></script>

</html>
